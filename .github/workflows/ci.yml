name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .

  dbt:
    name: dbt parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt
        run: pip install "dbt-snowflake~=1.11.5"
      - name: Parse dbt project
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/.github/dbt
        run: |
          dbt deps
          dbt parse